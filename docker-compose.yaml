services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile-dev
    ports:
      - 4200:4200
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  api:
    build:
      context: ./api
      dockerfile: Dockerfile-dev
    ports:
      - 3000:3000
    env_file: ./api/.env
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - redis

  redis:
    image: redis:8.6.3-alpine
    ports:
      - 6380:6379
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis-data:
